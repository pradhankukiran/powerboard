[server]
root_url = http://localhost:3002
serve_from_sub_path = false

[auth.anonymous]
enabled = true
org_name = Main Org.
org_role = Viewer

[security]
allow_embedding = true
cookie_samesite = none
cookie_secure = false

[dashboards]
default_home_dashboard_path = /etc/grafana/provisioning/dashboards/monitoring.json
