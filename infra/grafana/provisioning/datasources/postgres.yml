apiVersion: 1

datasources:
  - name: PostgreSQL
    type: postgres
    access: proxy
    url: ${GF_DATASOURCE_HOST}:5432
    database: powerboard
    user: powerboard
    isDefault: true
    jsonData:
      sslmode: disable
      maxOpenConns: 10
      maxIdleConns: 5
      connMaxLifetime: 14400
      postgresVersion: 1600
    secureJsonData:
      password: ${GF_DATASOURCE_PASSWORD}
    editable: true
