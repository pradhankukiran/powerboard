services:
  postgres:
    image: postgres:16-alpine
    container_name: pb-postgres
    environment:
      POSTGRES_DB: powerboard
      POSTGRES_USER: powerboard
      POSTGRES_PASSWORD: powerboard_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U powerboard -d powerboard"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - powerboard

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: pb-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgres://powerboard:powerboard_dev@postgres:5432/powerboard
      JWT_SECRET: powerboard_jwt_dev_secret
      GRAFANA_URL: http://grafana:3000
      METABASE_URL: http://metabase:3000
      METABASE_EMBEDDING_SECRET: ${METABASE_EMBEDDING_SECRET:-powerboard_metabase_secret}
      SUPERSET_URL: http://superset:8088
      SUPERSET_ADMIN_USER: ${SUPERSET_ADMIN_USER:-admin}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD:-admin}
    ports:
      - "3001:3001"
    networks:
      - powerboard

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: pb-web
    depends_on:
      - api
    ports:
      - "3000:3000"
    networks:
      - powerboard

  grafana:
    image: grafana/grafana-oss:11.4.0
    container_name: pb-grafana
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_DATASOURCE_PASSWORD: powerboard_dev
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/grafana.ini:/etc/grafana/grafana.ini
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3002:3000"
    networks:
      - powerboard

  metabase:
    image: metabase/metabase:v0.51.6
    container_name: pb-metabase
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: powerboard_metabase
      MB_DB_PORT: 5432
      MB_DB_USER: powerboard
      MB_DB_PASS: powerboard_dev
      MB_DB_HOST: postgres
      MB_EMBEDDING_SECRET_KEY: ${MB_EMBEDDING_SECRET_KEY:-powerboard_metabase_secret}
      JAVA_OPTS: "-Xmx512m"
    ports:
      - "3003:3000"
    networks:
      - powerboard

  superset:
    image: apache/superset:4.1.1
    container_name: pb-superset
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-powerboard_superset_dev_secret}
      ADMIN_USERNAME: ${SUPERSET_ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD:-admin}
      ADMIN_FIRST_NAME: PowerBoard
      ADMIN_LAST_NAME: Admin
      ADMIN_EMAIL: admin@powerboard.local
    volumes:
      - superset_data:/app/superset_home
      - ./infra/superset/superset_config.py:/app/pythonpath/superset_config.py
    ports:
      - "8088:8088"
    command: >
      bash -c "
        superset db upgrade &&
        superset fab create-admin
          --username $$ADMIN_USERNAME
          --firstname $$ADMIN_FIRST_NAME
          --lastname $$ADMIN_LAST_NAME
          --email $$ADMIN_EMAIL
          --password $$ADMIN_PASSWORD || true &&
        superset init &&
        superset run -h 0.0.0.0 -p 8088
      "
    networks:
      - powerboard

volumes:
  postgres_data:
  grafana_data:
  superset_data:

networks:
  powerboard:
    driver: bridge
